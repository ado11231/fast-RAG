# fastrag docs site configuration.
# Build with: mkdocs build
# Serve locally with: mkdocs serve

site_name: fastrag
site_description: Minimal RAG pipeline framework — raw documents in, queryable knowledge base out.
repo_url: https://github.com/anomalyco/fastrag
site_author: fastrag contributors

# Material theme — dark mode with indigo accent.
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.annotate

# Navigation order — matches the docs/ directory structure.
nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - CLI Reference: CLI_REFERENCE.md
  - Plugin Guide: PLUGIN_GUIDE.md
  - Plugins: PLUGINS.md
  - Contributing: CONTRIBUTING.md

# Markdown extensions for code highlighting and callouts.
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
